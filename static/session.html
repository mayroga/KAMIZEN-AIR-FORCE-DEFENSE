<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN TACTICAL - NEURO-SYNCHRONIZER</title>
    <style>
        :root {
            --bg: #020406;
            --primary: #00d4ff;
            --success: #00ff88;
            --danger: #ff3e3e;
            --text: #e6edf3;
            --border: 1px solid #30363d;
        }
        * { box-sizing: border-box; cursor: crosshair; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline HUD Effect */
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 212, 255, 0.05);
            position: fixed; top: 0; z-index: 999; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }

        #hud-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--primary);
            border-bottom: var(--border);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        #app {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(13, 17, 23, 0.9);
            border: var(--border);
            padding: 40px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.05);
        }

        /* --- CIRCULO RESPIRATORIO CIENTÍFICO --- */
        .breath-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.5;
        }

        /* Animación regulada: 5.5s Inhala, 5.5s Exhala (Ciclo de 11s) */
        .breath-active {
            animation: breathe-cycle 11s infinite ease-in-out;
        }

        @keyframes breathe-cycle {
            0%, 100% { transform: scale(0.4); opacity: 0.2; border-color: var(--primary); }
            50% { transform: scale(1.1); opacity: 1; border-color: var(--success); box-shadow: 0 0 30px var(--success); }
        }

        .breath-instruction {
            position: absolute;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--text);
            z-index: 10;
        }

        /* --- BOTONES TÁCTICOS --- */
        .btn-tactical {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        .btn-tactical:hover { background: var(--primary); color: var(--bg); }

        #dashboard {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: rgba(2, 4, 6, 0.95);
            border: var(--border);
            padding: 15px;
            font-size: 11px;
            border-left: 4px solid var(--primary);
        }

        .status-active { color: var(--success); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="hud-container">
        <div class="top-bar">
            <div>UNIT: 736-SFS-OPERATOR</div>
            <div class="status-active">● NEURO-LINK: ONLINE</div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="app">
            <!-- El contenido será inyectado por engine.js -->
            <div class="card">
                <h1 style="color:var(--primary)">KAMIZEN AI SYSTEM</h1>
                <p>Initializing Scientific Neuro-Priming Protocols...</p>
                <button class="btn-tactical" onclick="KamizenEngine.init()">LOAD MISSION DATA</button>
            </div>
        </div>

        <div id="dashboard">
            <p style="border-bottom: 1px solid #333; padding-bottom:5px; margin-bottom:10px;">BIO-SENSORS (PRE-VR)</p>
            <div id="telemetry-content">
                HRV: INITIALIZING...<br>
                STRESS: CALIBRATING...<br>
                ROE: 100%<br>
                JITTER: 0.00
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/static/js/engine.js"></script>
    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        // Interfaz de telemetría para engine.js
        window.updateHUD = function(data) {
            document.getElementById('telemetry-content').innerHTML = `
                HRV STABILITY: ${data.pulseSim || 0}%<br>
                VAGAL TONE: ${data.cognitiveLoad || 0}<br>
                ROE COMPLIANCE: ${data.roeCompliance || 100}%<br>
                MICRO-TREMOR: ${data.microTremor ? data.microTremor.toFixed(3) : 0}
            `;
        };
    </script>
</body>
</html>

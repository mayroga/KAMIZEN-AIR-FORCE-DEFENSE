<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - MaykaMi Neuro-Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --primary: #00d4ff; /* Blue Tactical */
            --success: #00ff88; /* Green Vagal */
            --danger: #ff3e3e;
            --text: #e0e0e0;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden; /* Evita scroll durante el entrenamiento */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* HUD Background Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- CONTENEDOR DE RESPIRACIÓN (ELIMINA SOLAPAMIENTO) --- */
        .breath-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid var(--primary);
            border-radius: 50%;
            transition: transform 5.5s ease-in-out, border-color 0.5s, box-shadow 0.5s;
            z-index: 1;
        }

        .breath-instruction {
            position: relative;
            z-index: 10;
            pointer-events: none; /* No interfiere con clics */
        }

        /* --- BOTONES TÁCTICOS --- */
        #options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-tactical {
            background: transparent;
            color: var(--text);
            border: 1px solid #444;
            padding: 18px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn-tactical:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--primary);
            padding-left: 25px;
        }

        .btn-tactical::before {
            content: ">>";
            margin-right: 10px;
            color: var(--primary);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-tactical:hover::before {
            opacity: 1;
        }

        /* --- TELEMETRÍA (HUD) --- */
        .telemetry {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: var(--primary);
            text-align: left;
            pointer-events: none;
        }

        /* --- ANIMACIÓN DE ENTRADA --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.5s ease-out; }

    </style>
</head>
<body>

    <!-- Telemetría de fondo (Decorativo/Inmersivo) -->
    <div class="telemetry">
        [ SYSTEM: MAYKAMI NEURO-ENGINE ]<br>
        [ STATUS: MONITORING VAGAL TONE ]<br>
        [ LINK: ENCRYPTED ]<br>
        <span id="hud-stats">SCANNING...</span>
    </div>

    <div id="app">
        <!-- Pantalla de Inicio -->
        <div class="card">
            <h1 style="color: var(--primary); letter-spacing: 4px; margin-bottom: 5px;">AL CIELO</h1>
            <p style="font-size: 12px; margin-bottom: 30px; opacity: 0.7;">ADVISORY NEURO-TACTICAL SYSTEM</p>
            
            <div style="text-align: left; margin-bottom: 30px; font-size: 14px; line-height: 1.6;">
                <p><i class="fas fa-check-circle" style="color:var(--success)"></i> Disciplina de respiración científica.</p>
                <p><i class="fas fa-check-circle" style="color:var(--success)"></i> Aleatoriedad cognitiva contra patrones.</p>
                <p><i class="fas fa-check-circle" style="color:var(--success)"></i> Evaluación de toma de decisiones en crisis.</p>
            </div>

            <button class="btn-tactical" style="text-align:center;" onclick="MaykaMiEngine.init()">
                INITIALIZE PROTOCOL
            </button>
        </div>
    </div>

    <!-- Scripts de Motor -->
    <script src="/static/js/engine.js"></script>
    <script>
        // Función para actualizar HUD de telemetría dinámicamente
        window.updateHUD = function(data) {
            const hud = document.getElementById("hud-stats");
            hud.innerHTML = `
                PULSE: ${data.pulseSim} BPM<br>
                COGNITIVE LOAD: ${data.cognitiveLoad}%<br>
                ROE COMPLIANCE: ${data.roeCompliance}%<br>
                TREMOR: ${data.microTremor}
            `;
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MAYKAMI TACTICAL - NEURO-SYNCHRONIZER</title>
    <style>
        :root {
            --bg: #020406;
            --primary: #00d4ff;
            --success: #00ff88;
            --danger: #ff3e3e;
            --text: #e6edf3;
            --border: 1px solid #30363d;
        }
        * { box-sizing: border-box; cursor: crosshair; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline HUD Effect */
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 212, 255, 0.05);
            position: fixed; top: 0; z-index: 999; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }

        #hud-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--primary);
            border-bottom: var(--border);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        #app {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .card {
            background: rgba(13, 17, 23, 0.9);
            border: var(--border);
            padding: 40px;
            width: 100%;
            max-width: 750px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.05);
        }

        /* --- SCIENTIFIC BREATHING CIRCLE --- */
        .breath-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid var(--primary);
            border-radius: 50%;
            opacity: 0.5;
        }

        /* Regulated Animation: 5.5s Inhale, 5.5s Exhale (11s Cycle) */
        .breath-active {
            animation: breathe-cycle 11s infinite ease-in-out;
        }

        @keyframes breathe-cycle {
            0%, 100% { transform: scale(0.4); opacity: 0.2; border-color: var(--primary); }
            50% { transform: scale(1.2); opacity: 1; border-color: var(--success); box-shadow: 0 0 40px var(--success); }
        }

        .breath-instruction {
            position: absolute;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--text);
            z-index: 10;
        }

        /* --- TACTICAL INTERFACE --- */
        .btn-tactical {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin: 8px;
            text-transform: uppercase;
        }
        .btn-tactical:hover { 
            background: var(--primary); 
            color: var(--bg); 
            box-shadow: 0 0 20px var(--primary);
        }

        #dashboard {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(2, 4, 6, 0.95);
            border: var(--border);
            padding: 15px;
            font-size: 11px;
            border-left: 4px solid var(--primary);
            z-index: 100;
        }

        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .status-active { color: var(--success); animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="hud-container">
        <div class="top-bar">
            <div>OPERATOR: MAYKAMI-TACTICAL-CORE</div>
            <div class="status-active">● NEURAL-LINK: STABLE</div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="app">
            <!-- Initial content before Engine takes over -->
            <div class="card">
                <h1 style="color:var(--primary); margin-bottom: 10px;">MAYKAMI NEURO-ENGINE</h1>
                <p style="opacity: 0.7; font-size: 0.9em;">System Ready for Tactical Synchronization</p>
                <hr>
                <button class="btn-tactical" onclick="MaykaMiEngine.init()">INITIALIZE PROTOCOLS</button>
            </div>
        </div>

        <div id="dashboard">
            <p style="border-bottom: 1px solid #333; padding-bottom:5px; margin-bottom:10px; color: var(--primary);">NEURAL TELEMETRY</p>
            <div id="telemetry-content">
                HRV STABILITY: CALIBRATING...<br>
                VAGAL TONE: SCANNING...<br>
                ROE COMPLIANCE: 100%<br>
                MICRO-TREMOR: 0.000
            </div>
        </div>
    </div>

    <!-- CORE ENGINE -->
    <script src="/static/js/engine.js"></script>
    <script>
        // Real-time HUD Clock
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Interface Bridge for engine.js Telemetry
        window.updateHUD = function(data) {
            const telemetry = document.getElementById('telemetry-content');
            if (telemetry) {
                telemetry.innerHTML = `
                    HRV STABILITY: ${data.pulseSim || 0}%<br>
                    VAGAL TONE: ${data.cognitiveLoad || 0}<br>
                    ROE COMPLIANCE: ${data.roeCompliance || 100}%<br>
                    MICRO-TREMOR: ${data.microTremor ? parseFloat(data.microTremor).toFixed(3) : "0.000"}
                `;
            }
        };
    </script>
</body>
</html>

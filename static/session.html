<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN TACTICAL - MISSION INTERFACE</title>
    <style>
        :root{
            --bg:#05070a; /* Negro profundo militar */
            --card:#0d1117;
            --primary:#00d4ff; /* Azul HUD */
            --success:#00ff88; /* Verde Neón Táctico */
            --danger:#ff3e3e;
            --text:#e6edf3;
            --dim:#7d8590;
            --border: 1px solid #30363d;
        }
        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family: 'Courier New', Courier, monospace; /* Fuente de terminal */
            background:var(--bg);
            color:var(--text);
            display:flex;
            flex-direction: column;
            align-items:center;
            min-height:100vh;
            text-transform: uppercase; /* Todo en mayúsculas para seriedad militar */
        }
        #main-container{
            width:100%;
            max-width:800px;
            padding:20px;
        }
        .card{
            background:var(--card);
            padding:20px;
            border-radius:4px; /* Menos redondeado, más industrial */
            margin:15px 0;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
            border: var(--border);
            position: relative;
        }
        /* Decoración de esquinas tipo HUD militar */
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--primary); border-left: 2px solid var(--primary);
        }
        .card::after {
            content: ""; position: absolute; bottom: 0; right: 0; width: 10px; height: 10px;
            border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary);
        }

        button{
            width:100%;
            padding:18px;
            border: 1px solid var(--primary);
            background: rgba(0, 212, 255, 0.05);
            color:var(--primary);
            font-weight:bold;
            font-size: 16px;
            cursor:pointer;
            transition: 0.3s;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        button:hover{ background:var(--primary); color: var(--bg); box-shadow: 0 0 15px var(--primary); }
        button:disabled{ border-color: #334155; color: #334155; cursor: not-allowed; }

        .answer{
            background: rgba(255,255,255,0.02);
            padding:15px;
            margin:10px 0;
            border: 1px solid #30363d;
            cursor:pointer;
            transition: 0.2s;
        }
        .answer:hover{ border-color: var(--success); background: rgba(0, 255, 136, 0.05); color: var(--success); }

        /* Círculo de Respiración - Calibración Biométrica */
        .breath-circle{
            width:180px;
            height:180px;
            border-radius:50%;
            margin:40px auto;
            border: 2px solid var(--primary);
            display:flex;
            flex-direction: column;
            align-items:center;
            justify-content:center;
            font-size: 14px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transition: transform 4s ease-in-out;
        }
        .pulse { animation: pulse-animation 4s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.4); opacity: 1; border-width: 4px; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .status-bar {
            display: flex; justify-content: space-between; font-size: 10px; color: var(--primary);
            margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 5px;
        }

        h1,h2,h3{ margin:10px 0; letter-spacing: 3px; }
        .center{ text-align:center; }
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 212, 255, 0.1);
            position: fixed; top: 0; z-index: 999; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }
    </style>
</head>
<body>
<div class="scanline"></div>

<div id="main-container">
    <div class="status-bar">
        <span>DEVICE: SFS-TABLET-01</span>
        <span>SYSTEM: KAMIZEN TACTICAL v2.0</span>
        <span>STATUS: ENCRYPTION ACTIVE</span>
    </div>

    <div class="card center">
        <h2 style="color:var(--primary);">OPERATIONAL READINESS</h2>
        <p style="font-size: 10px; color:var(--dim);">NEURO-COGNITIVE PRE-FLIGHT CHECK</p>
    </div>

    <div id="app">
        <div class="card center">
            <h3 class="pulse">LOADING MISSION DATA...</h3>
            <p style="color:var(--dim);">ESTABLISHING SECURE OFFLINE LINK</p>
        </div>
    </div>

    <div id="admin-controls" class="card" style="display:none; border-color: var(--danger);">
        <p style="color:var(--danger); font-size: 10px;">ADMINISTRATOR OVERRIDE</p>
        <input id="missionInput" type="number" placeholder="MISSION ID" 
               style="width:100%;padding:12px;border:1px solid #30363d; background:#000; color:var(--primary); margin-bottom:10px;">
        <button onclick="jumpToMissionManual()" style="border-color:var(--dim); color:var(--dim);">FORCE JUMP</button>
    </div>
</div>

<script src="/static/js/engine.js"></script>

<script>
    // Función para activar controles de instructor (Atajo: Triple click en el título)
    let clicks = 0;
    document.querySelector('h2').addEventListener('click', () => {
        clicks++;
        if (clicks === 3) {
            document.getElementById('admin-controls').style.display = 'block';
            clicks = 0;
        }
    });

    function jumpToMissionManual() {
        const input = document.getElementById("missionInput");
        const id = Number(input.value);
        if (typeof KamizenEngine !== "undefined") {
            KamizenEngine.startMission(id);
        }
    }
</script>
</body>
</html>
